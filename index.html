<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tan19413 Tools</title>
    <style>
        /* สไตล์พื้นฐาน: เน้นสะอาดและทันสมัย */
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #334155;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ส่วนหัวและปุ่มเปลี่ยนภาษา */
        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .lang-btn {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 20px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-btn:hover {
            background: var(--primary);
            color: white;
        }

        h1 { margin: 0; color: #1e293b; }

        /* จัดวาง Card เป็น Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        /* ตกแต่ง Card */
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        .card-icon { font-size: 40px; margin-bottom: 15px; display: block; }

        .card h3 { margin: 10px 0; color: #1e293b; }

        .card p { font-size: 0.9em; color: #64748b; margin-bottom: 20px; min-height: 40px; }

        /* ปุ่มกด */
        .btn-open {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            display: block;
        }

        .btn-open:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <h1 data-key="main_title">เครื่องมือของ Tan19413</h1>
    <button class="lang-btn" onclick="switchLang()" id="btn-lang">English</button>
</header>

<div class="grid">
    <!-- เว็บที่ 1 -->
    <div class="card">
        <div>
            <span class="card-icon">📊</span>
            <h3 data-key="gpa_t">เครื่องคำนวณเกรดเฉลี่ย</h3>
            <p data-key="gpa_d">คำนวณเกรดเฉลี่ยของคุณได้ง่ายๆ และรวดเร็ว</p>
        </div>
        <a href="https://gpacalculatorbytan.pages.dev/" class="btn-open" data-key="btn_text">เปิดใช้งาน</a>
    </div>

    <!-- เว็บที่ 2 -->
    <div class="card">
        <div>
            <span class="card-icon">📱</span>
            <h3 data-key="qr_t">สร้าง QR Code ฟรี</h3>
            <p data-key="qr_d">สร้าง QR Code สำหรับลิงก์หรือข้อความได้ทันที</p>
        </div>
        <a href="https://noadsqrcodegen.pages.dev/" class="btn-open" data-key="btn_text">เปิดใช้งาน</a>
    </div>
    <!-- เว็บที่ 3 -->
    <div class="card">
        <div>
            <span class="card-icon">🎓</span>
            <h3 data-key="tcas_t">TCAS Calculator</h3>
            <p data-key="tcas_d">เครื่องมือช่วยคำนวณคะแนนสำหรับระบบ TCAS</p>
        </div>
        <a href="https://mytcascalculatorfighton.pages.dev/" class="btn-open" data-key="btn_text">เปิดใช้งาน</a>
    </div>
</div>

<script>
    // 1. ข้อมูลภาษา (เพิ่ม/แก้ไข ตรงนี้ได้เลย)
    const langData = {
        th: {
            main_title: "เครื่องมือของ Tan19413",
            btn_text: "เปิดใช้งาน",
            gpa_t: "เครื่องคำนวณเกรดเฉลี่ย",
            gpa_d: "คำนวณเกรดเฉลี่ยของคุณได้ง่ายๆ และรวดเร็ว",
            qr_t: "สร้าง QR Code ฟรี",
            qr_d: "สร้าง QR Code สำหรับลิงก์หรือข้อความได้ทันที",
            logic_t: "จำลองลอจิกเกต",
            logic_d: "ทดลองสร้างวงจรดิจิทัลแบบลอจิกเกตออนไลน์",
            tcas_t: "TCAS Calculator",
            tcas_d: "เครื่องมือช่วยคำนวณคะแนนสำหรับระบบ TCAS",
            next_btn: "English"
        },
        en: {
            main_title: "Tan19413 Tools",
            btn_text: "Open Tool",
            gpa_t: "GPA Calculator",
            gpa_d: "Easily calculate your GPA and GPAX in seconds.",
            qr_t: "Free QR Generator",
            qr_d: "Generate QR codes for links or text instantly.",
            logic_t: "Logic Gate Sim",
            logic_d: "Experiment with digital logic circuits online.",
            tcas_t: "TCAS Calculator",
            tcas_d: "Admission score calculator for TCAS system.",
            next_btn: "ภาษาไทย"
        }
    };

    let currentLang = 'th';

    // 2. ฟังก์ชันสลับภาษา (ไม่ต้องแก้ไขส่วนนี้)
    function switchLang() {
        currentLang = (currentLang === 'th') ? 'en' : 'th';
        
        // วนลูปเปลี่ยนข้อความที่มี data-key ทั้งหมด
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            el.innerText = langData[currentLang][key];
        });

        // เปลี่ยนข้อความบนปุ่ม
        document.getElementById('btn-lang').innerText = langData[currentLang].next_btn;
    }
</script>

</body>
</html>
